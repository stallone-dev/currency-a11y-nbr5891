<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CalcAUD Editor Sandbox</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fcfcfc; }
        #editor-container { height: 100%; width: 100%; }
        .cm-editor { height: 100% !important; }
    </style>
</head>
<body>
    <div id="editor-container"></div>
    <!-- Carrega o bundle como um script global (IIFE) -->
    <script src="editor_controller.bundle.js"></script>
    <script>
        // Inicializa através das funções globais expostas pelo bundle
        if (typeof window.setupEditor === "function") {
            window.setupEditor("editor-container");
        } else {
            console.error("Editor Bundle falhou ao carregar as funções globais.");
        }

        // Comunicação via PostMessage
        window.addEventListener("message", (event) => {
            if (event.data.type === "GET_CODE") {
                try {
                    const code = window.getUserCode();
                    window.parent.postMessage({ type: "CODE_RESPONSE", code }, "*");
                } catch (e) {
                    window.parent.postMessage({ type: "CODE_ERROR", error: e.message }, "*");
                }
            }
        });

        // Notifica a página pai que o editor está pronto
        window.parent.postMessage({ type: "EDITOR_READY" }, "*");
    </script>
</body>
</html>
