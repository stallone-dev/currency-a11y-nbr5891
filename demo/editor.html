<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>CalcAUD Editor Sandbox</title>
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                background: #fcfcfc;
            }

            #editor-container {
                height: 100%;
                width: 100%;
            }

            /* Replicar estilos básicos para evitar pulo visual */
            .cm-editor {
                height: 100% !important;
            }
        </style>
    </head>

    <body>
        <div id="editor-container"></div>
        <script type="module">
            import { getUserCode, setupEditor } from "./editor_controller.bundle.js";

            // Inicializa o editor
            setupEditor("editor-container");

            // Escuta comandos da página pai
            window.addEventListener("message", (event) => {
                if (event.data.type === "GET_CODE") {
                    try {
                        const code = getUserCode();
                        window.parent.postMessage({ type: "CODE_RESPONSE", code }, "*");
                    } catch (e) {
                        window.parent.postMessage({ type: "CODE_ERROR", error: e.message }, "*");
                    }
                }
            });

            // Notifica que está pronto
            window.parent.postMessage({ type: "EDITOR_READY" }, "*");
        </script>
    </body>
</html>
